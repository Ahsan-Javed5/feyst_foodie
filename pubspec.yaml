name: chef
description: A new Flutter application.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.9+11

environment:
  sdk: ">=2.17.0 <3.0.0"

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.

dependencies:
  auto_route: ^7.9.1
  cupertino_icons: ^1.0.6
  dropdown_search: ^5.0.6
  easy_search_bar: ^2.5.0
  equatable: ^2.0.5
  file_picker: ^6.2.0
  flash: ^3.1.0
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.4
  flutter_html: ^3.0.0-beta.2
  flutter_inappwebview: ^5.8.0
  flutter_svg: ^2.0.10+1
  freezed_annotation: ^2.4.1
  firebase_app_check: ^0.2.1+18
  firebase_core: ^2.27.1
  firebase_messaging: ^14.2.2
  #firebase_core: ^2.14.0
  #firebase_messaging: ^14.6.5
  firebase_auth: ^4.17.9
  firebase_phone_auth_handler: 1.0.8
  get_it: ^7.6.7
  google_fonts: ^6.2.0
  http: ^1.2.1
  image_picker: ^1.0.7
  injectable: ^2.3.5
  intl: ^0.19.0
  json_serializable: ^6.7.1
  move_to_background: 1.0.2
  marqueer: ^1.3.1
  open_file: ^3.3.2
  open_settings: 2.0.2
  package_info_plus: ^4.2.0
  permission_handler: ^11.0.1
  pinput: ^4.0.0
  scan: 1.6.0
  shared_preferences: ^2.2.2
  pin_code_fields: ^8.0.1
  flutter_rating_bar: ^4.0.1
  qr_flutter: ^4.0.0
  google_maps_flutter: ^2.2.8
  double_back_to_close_app: ^2.1.0
  carousel_slider: ^4.2.1
  video_player: ^2.6.1
  collection: ^1.17.0
  webview_flutter: ^4.2.2
  url_launcher: ^6.1.11
  mime: ^1.0.4
  dio: ^5.2.1+1
  flutter_local_notifications: ^17.0.0
  country_code_picker: ^3.0.0
  flutter_image_compress: ^2.0.4
  firebase_crashlytics: ^3.3.2
  fl_webview: ^1.1.2
  webview_flutter_wkwebview: ^3.9.4
  flutter_launcher_icons: ^0.13.1
  flutter_carousel_media_slider: ^0.0.2
  chewie: ^1.8.0


dev_dependencies:
  analyzer: ^6.4.1
  auto_route_generator: ^7.3.2
  bloc_test: ^9.1.6
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter
  freezed: ^2.4.7
  injectable_generator: ^2.5.1
  json_annotation: ^4.8.1
  mockito: ^5.4.4

flutter_icons:
  image_path: "assets/images/ic_launcher.png"
  android: false
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/icons/
    - assets/json/
    - assets/videos/
    - assets/html/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Thin.ttf
          weight: 200
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 600
        - asset: assets/fonts/Roboto-Black.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Black.ttf
          weight: 800
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800
